version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      chrome:
        patterns:
          - "*chrome*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    versioning-strategy: "increase"
    groups:
      svelte:
        patterns:
          - "*vite*"
          - "*svelte*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
